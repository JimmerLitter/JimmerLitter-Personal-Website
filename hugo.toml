baseURL = "https://www.jimmerlitter.com/"
title = "James Huang"
theme = "PaperMod"
locale = "en-us"
enableRobotsTXT = true

[params]
  defaultTheme = "auto"
  showReadingTime = true
  showWordCount = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowFullTextinRSS = true

  [params.profileMode]
    enabled = true
    title = "James Huang"
    subtitle = "ECE @ UCSD · Robotics · Buisness Development · Startups"
    imageUrl = "/images/profile.jpg"
    imageTitle = "James Huang"
    imageWidth = 120
    imageHeight = 120

    [[params.profileMode.buttons]]
      name = "About"
      url = "about"

    [[params.profileMode.buttons]]
      name = "Athletic"
      url = "athletic"

    [[params.profileMode.buttons]]
      name = "Blog"
      url = "posts"

    [[params.profileMode.buttons]]
      name = "Books"
      url = "books"

    [[params.profileMode.buttons]]
      name = "Creative"
      url = "creative"

    [[params.profileMode.buttons]]
      name = "Resume"
      url = "james-huang-resume.pdf"

    [[params.profileMode.buttons]]
      name = "Startup Incubator"
      url = "https://startupincubatorsd.com/"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/JimmerLitter"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/jameshuanger/"

  [[params.socialIcons]]
    name = "x"
    url = "https://x.com/jamestuffdemon"

