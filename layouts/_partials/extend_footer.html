{{- /* Open the resume PDF and any external links (different host) in a new tab.
       PaperMod's link templates don't expose a target attribute, so this covers
       the nav menu, Profile Mode buttons, and social icons in one place. */ -}}
<script>
  document.addEventListener("DOMContentLoaded", function () {
    var host = window.location.hostname;
    document.querySelectorAll("a[href]").forEach(function (a) {
      var href = a.getAttribute("href") || "";
      var isResume = href.indexOf("James-Huang-Resume") !== -1;
      var isExternal = a.hostname && a.hostname !== host;
      if (isResume || isExternal) {
        a.target = "_blank";
        a.rel = "noopener noreferrer";
      }
    });
  });
</script>
